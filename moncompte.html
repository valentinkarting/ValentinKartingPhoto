<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Compte</title>
<link rel="stylesheet" href="moncompte.css">
</head>
<body>

<div class="user-container">
    <h1>Mon Compte</h1>

    <div id="user-info">
        <p><strong>Nom :</strong> <span id="user-lastname"></span></p>
        <p><strong>Prénom :</strong> <span id="user-firstname"></span></p>
        <p><strong>Email :</strong> <span id="user-email"></span></p>
    </div>

    <h2>Historique des achats</h2>
    <div id="purchase-history">Chargement...</div>

    <div class="user-actions">
        <button id="logoutBtn">Se déconnecter</button>
        <button id="deleteAccountBtn">Supprimer mon compte</button>
        <button class="quit-btn" onclick="window.location.href='index.html'">Quitter</button>
    </div>
</div>

<script type="module">
import { auth, db } from "./auth.js";
import { signOut, onAuthStateChanged, deleteUser, EmailAuthProvider, reauthenticateWithCredential } 
    from "https://www.gstatic.com/firebasejs/10.6.0/firebase-auth.js";
import { doc, getDoc, collection, getDocs, deleteDoc } 
    from "https://www.gstatic.com/firebasejs/10.6.0/firebase-firestore.js";

document.addEventListener("DOMContentLoaded", () => {
    const lastnameEl = document.getElementById("user-lastname");
    const firstnameEl = document.getElementById("user-firstname");
    const emailEl = document.getElementById("user-email");
    const historyDiv = document.getElementById("purchase-history");
    const logoutBtn = document.getElementById("logoutBtn");
    const deleteBtn = document.getElementById("deleteAccountBtn");

    onAuthStateChanged(auth, async (user) => {
        if (!user) return window.location.replace("compte.html");
        emailEl.textContent = user.email;

        try {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                const data = userDoc.data();
                firstnameEl.textContent = data.firstName || "";
                lastnameEl.textContent = data.lastName || "";
            }
        } catch (err) { console.error(err); }

        try {
            const purchasesSnapshot = await getDocs(collection(db, "users", user.uid, "purchases"));
            if (purchasesSnapshot.empty) historyDiv.textContent = "Aucun achat.";
            else purchasesSnapshot.forEach(docSnap => {
                const p = document.createElement("p");
                const purchase = docSnap.data();
                p.textContent = `Produit: ${purchase.item}, Date: ${purchase.date}, Prix: ${purchase.price}€`;
                historyDiv.appendChild(p);
            });
        } catch (err) { console.error(err); }
    });

    logoutBtn.addEventListener("click", async () => {
        await signOut(auth);
        window.location.href = "index.html";
    });

    if (deleteBtn) {
        deleteBtn.addEventListener("click", async () => {
            const user = auth.currentUser;
            if (!user) return alert("Aucun utilisateur connecté.");
            if (!confirm("⚠️ Supprimer votre compte ?")) return;

            try {
                await deleteDoc(doc(db, "users", user.uid));
                await deleteUser(user);
                alert("Compte supprimé !");
                window.location.href = "index.html";
            } catch (error) {
                if (error.code === "auth/requires-recent-login") {
                    const password = prompt("Re-saisissez votre mot de passe :");
                    if (!password) return;
                    try {
                        const credential = EmailAuthProvider.credential(user.email, password);
                        await reauthenticateWithCredential(user, credential);
                        await deleteDoc(doc(db, "users", user.uid));
                        await deleteUser(user);
                        alert("Compte supprimé !");
                        window.location.href = "index.html";
                    } catch (err) { alert("Erreur mot de passe ou suppression."); }
                } else { alert("Erreur suppression compte."); }
            }
        });
    }
});
</script>

</body>
</html>
