<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deux Fenêtres Responsives</title>

    <!-- 1. Consentement pour google analytics (très tôt) -->
    <script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}

// 🔥 Consentement par défaut (AVANT choix utilisateur)
gtag('consent', 'default', {
  analytics_storage: 'denied',
  ad_storage: 'denied',
  ad_user_data: 'denied',
  ad_personalization: 'denied'

</script>

    <link rel="stylesheet" href="reservation.css">
    <link rel="stylesheet" href="cookies.css">

    <script type="text/javascript" src="https://cdn.emailjs.com/dist/email.min.js"></script>

</head>

<body>

    
    <div class="container">
        <div class="window window1">
            <input type="text" id="A24" class="text-zone" placeholder="Nom et Prénom">
            <input type="text" id="A25" class="text-zone" placeholder="Catégorie et numéro">
            <input type="text" id="A26" class="text-zone" placeholder="Date et lieu du meeting">
            <input type="text" id="A27" class="text-zone" placeholder="Adresse Email">

            <div class="checkbox-container">
                <label id="A28"><input type="radio" name="option" value="Option 1">Pack 10 photos 50€ (photos au choix)</label>
                <label id="A29"><input type="radio" name="option" value="Option 2">Réel 40~75€ (15 à 30s)</label>
                <label id="A30"><input type="radio" name="option" value="Option 3">Pack réel + photos 80€ (10 photos au choix +
                    réel de 15s)</label>

            </div>

            <button id="A31" class="validate-btn" onclick="validate()">Valider</button>
        </div>
        <div class="window window2">
            <input type="text" class="text-zone" id="output1" placeholder="" readonly>
            <input type="text" class="text-zone" id="output2" placeholder="" readonly>
            <input type="text" class="text-zone" id="output3" placeholder="" readonly>
            <input type="text" class="text-zone" id="output4" placeholder="" readonly>
            <input type="text" class="text-zone" id="output5" placeholder="" readonly>

            <p id="A32" class="info-text">PAIEMENT LORS DE L'ÉVÈNEMENT.</p>

            <button id="A33" class="send-btn" onclick="send()">Envoyer</button>
        </div>

    </div>

    <!-- script pour désactiver clic droit souris pas d'enregistrement photo  -->

    <script>
        document.addEventListener('contextmenu', function (e) {
            e.preventDefault();
        });   
    </script>



    <script src="reservation.js"></script>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
    </script>
    <script type="text/javascript">
        (function () {
            emailjs.init({
                publicKey: "UEQgbTpV4NaC6rHwU",
            });
        })();
    </script>

    <!-- Nouvelle partie pour changement de langue -->
<script src="lang.js"></script>
<!----------------------------------------------->

<!-- ===================== -->
<!-- 🍪 BANNIÈRE COOKIES -->
<!-- ===================== -->
<div class="cookie-banner" id="cookie-banner">
    <div class="cookie-content">
        <p id="A105">Gérez vos préférences.</p>
        
        <div class="cookie-buttons">
            <button id="accept-all">Accepter</button>
            <button id="refuse-all">Refuser</button>
            <button id="open-settings">Personnaliser</button>
        </div>
    </div>
</div>

<!-- ===================== -->
<!-- ⚙️ MODAL PRÉFÉRENCES -->
<!-- ===================== -->
<div class="cookie-modal" id="cookie-modal">
    <div class="cookie-modal-content">
        <h2>Préférences cookies</h2>

        <!-- Cookies essentiels -->
        <div class="cookie-option">
            <span>Cookies essentiels (obligatoires)</span>
            <span class="status">YES</span>
        </div>

        <!-- Cookies analytiques -->
        <div class="cookie-option">
            <span>Cookies analytiques</span>
            <label class="switch">
                <input type="checkbox" id="analytics-cookies">
                <span class="slider"></span>
            </label>
            <span class="status" id="analytics-status">NO</span>
        </div>

        <!-- Cookies marketing -->
        <div class="cookie-option">
            <span>Cookies marketing</span>
            <label class="switch">
                <input type="checkbox" id="marketing-cookies">
                <span class="slider"></span>
            </label>
            <span class="status" id="marketing-status">NO</span>
        </div>

        <div class="cookie-actions">
            <button id="save-preferences">Enregistrer mes choix</button>
        </div>
    </div>
</div>

<!-- ===================== -->
<!-- 📜 SCRIPT COOKIES -->
<!-- ===================== -->
<script src="cookies.js"></script>





</body>

</html>
