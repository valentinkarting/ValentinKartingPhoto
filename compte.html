<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compte</title>

<!-- 1. Consentement pour google analytics (très tôt) -->
    <script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}

// 🔥 Consentement par défaut (AVANT choix utilisateur)
gtag('consent', 'default', {
  analytics_storage: 'denied',
  ad_storage: 'denied',
  ad_user_data: 'denied',
  ad_personalization: 'denied'

</script>

<!-- ✅ CSS intl-tel-input (version récente) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@25.11.3/build/css/intlTelInput.css">

<link rel="stylesheet" href="compte.css">
<link rel="stylesheet" href="cookies.css">

</head>
<body>

<div class="account-container">
    <h2 id="A52">Connexion</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Mot de passe">
    <label id="showLoginPasswordLabel"><input type="checkbox" id="showLoginPassword"> Afficher le mot de passe</label>
    <button id="loginBtn">Se connecter</button>

    <h2 id="A53">Créer un compte</h2>
    <input type="text" id="firstName" placeholder="Prénom">
    <input type="text" id="lastName" placeholder="Nom">
    <input type="email" id="signupEmail" placeholder="Email">

    <!-- ✅ INPUT TELEPHONE SIMPLE -->
    <input type="tel" id="phone" placeholder="Numéro de téléphone">

    <input type="password" id="signupPassword" placeholder="Mot de passe">
    <label id="showSignupPasswordLabel"><input type="checkbox" id="showSignupPassword"> Afficher le mot de passe</label>
    <button id="signupBtn">Créer compte</button>

    <p id="message"></p>
    <button id="A54" class="quit-btn" onclick="window.location.href='index.html'">Quitter</button>
</div>

<!-- ✅ JS intl-tel-input -->
<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@25.11.3/build/js/intlTelInput.min.js"></script>

<!-- Ton script -->
<script type="module" src="compte.js"></script>

<!-- Nouvelle partie pour changement de langue -->
<script src="lang.js" defer></script>

<!-- ===================== -->
<!-- 🍪 BANNIÈRE COOKIES -->
<!-- ===================== -->
<div class="cookie-banner" id="cookie-banner">
    <div class="cookie-content">
        <p id="A105">Gérez vos préférences.</p>
        
        <div class="cookie-buttons">
            <button id="accept-all">Accepter</button>
            <button id="refuse-all">Refuser</button>
            <button id="open-settings">Personnaliser</button>
        </div>
    </div>
</div>

<!-- ===================== -->
<!-- ⚙️ MODAL PRÉFÉRENCES -->
<!-- ===================== -->
<div class="cookie-modal" id="cookie-modal">
    <div class="cookie-modal-content">
        <h2>Préférences cookies</h2>

        <!-- Cookies essentiels -->
        <div class="cookie-option">
            <span>Cookies essentiels (obligatoires)</span>
            <span class="status">YES</span>
        </div>

        <!-- Cookies analytiques -->
        <div class="cookie-option">
            <span>Cookies analytiques</span>
            <label class="switch">
                <input type="checkbox" id="analytics-cookies">
                <span class="slider"></span>
            </label>
            <span class="status" id="analytics-status">NO</span>
        </div>

        <!-- Cookies marketing -->
        <div class="cookie-option">
            <span>Cookies marketing</span>
            <label class="switch">
                <input type="checkbox" id="marketing-cookies">
                <span class="slider"></span>
            </label>
            <span class="status" id="marketing-status">NO</span>
        </div>

        <div class="cookie-actions">
            <button id="save-preferences">Enregistrer mes choix</button>
        </div>
    </div>
</div>

<!-- ===================== -->
<!-- 📜 SCRIPT COOKIES -->
<!-- ===================== -->
<script src="cookies.js"></script>


</body>
</html>
