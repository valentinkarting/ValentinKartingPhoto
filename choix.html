<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Choix</title>

    <!-- 1. Consentement pour google analytics (très tôt) -->
    <script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}

// 🔥 Consentement par défaut (AVANT choix utilisateur)
gtag('consent', 'default', {
  analytics_storage: 'denied',
  ad_storage: 'denied',
  ad_user_data: 'denied',
  ad_personalization: 'denied'
});
</script>

    <link rel="stylesheet" href="choix.css" />
    <link rel="stylesheet" href="cookies.css">
</head>

<body>
    <div class="main-container">
        <div class="button-container">
            <div class="window">
                <!-- Bouton pour ouvrir le modal de réservation -->
                <button id="reservationBtn">Réservez vos médias</button>
            </div>
            <div class="window">
                <!-- Bouton qui ouvrira le modal d'achat -->
                <button id="achatBtn">Achetez vos photos</button>
            </div>
        </div>

        <!-- Cube 3D (les images sur les faces restent affichées) -->
        <div class="cube-window">
            <a href="index.html" class="cube-link">
                <div class="cube">
                    <div class="face front">
                        <img src="./photochoix/logo final Valou.PNG" alt="Front" />
                    </div>
                    <div class="face back">
                        <img src="./photochoix/logo final Valou.PNG" alt="Back" />
                    </div>
                    <div class="face left">
                        <img src="./photochoix/logo final Valou.PNG" alt="Left" />
                    </div>
                    <div class="face right">
                        <img src="./photochoix/logo final Valou.PNG" alt="Right" />
                    </div>
                    <div class="face top">
                        <img src="./photochoix/logo final Valou.PNG" alt="Top" />
                    </div>
                    <div class="face bottom">
                        <img src="./photochoix/logo final Valou.PNG" alt="Bottom" />
                    </div>
                </div>
            </a>
        </div>
    </div>

    <!-- Modal pour l'achat (déjà existant) -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-content">
            <p id="A17">Choisissez votre option :</p>
            <div class="modal-buttons">
                <a href="achat.html" id="A13" class="modal-link">Pack 10 photos 50€</a>
                <a href="achatbis.html" id="A14" class="modal-link">À l'unité 6€/photo</a>
            </div>
            <button id="closeModal" class="close-modal">Annuler</button>
        </div>
    </div>

    <!-- Nouveau Modal pour la réservation -->
    <div id="modalOverlayReservation" class="modal-overlay">
        <div class="modal-content">
            <p id="A18">Choisissez votre option:</p>
            <div class="modal-buttons">
                <a href="reservation.html" id="A15" class="modal-link">Photos / Vidéos</a>
                <a href="demande.html" id="A16" class="modal-link">Demandes particulières</a>
            </div>
            <button id="closeModalReservation" class="close-modal">Annuler</button>
        </div>
    </div>

    <!-- Script pour désactiver clic droit (pas d'enregistrement photo) -->
    <script>
        document.addEventListener('contextmenu', function (e) {
            e.preventDefault();
        });
    </script>

    <script src="choix.js"></script>

    <!-- Nouvelle partie pour changement de langue -->
<script src="lang.js"></script>
<!----------------------------------------------->

<!-- ===================== -->
<!-- 🍪 BANNIÈRE COOKIES -->
<!-- ===================== -->
<div class="cookie-banner" id="cookie-banner">
    <div class="cookie-content">
        <p id="A105">Gérez vos préférences. </p>
        
        <div class="cookie-buttons">
            <button id="accept-all">Accepter</button>
            <button id="refuse-all">Refuser</button>
            <button id="open-settings">Personnaliser</button>
        </div>
    </div>
</div>

<!-- ===================== -->
<!-- ⚙️ MODAL PRÉFÉRENCES -->
<!-- ===================== -->
<div class="cookie-modal" id="cookie-modal">
    <div class="cookie-modal-content">
        <h2>Préférences cookies</h2>

        <!-- Cookies essentiels -->
        <div class="cookie-option">
            <span>Cookies essentiels (obligatoires)</span>
            <span class="status">YES</span>
        </div>

        <!-- Cookies analytiques -->
        <div class="cookie-option">
            <span>Cookies analytiques</span>
            <label class="switch">
                <input type="checkbox" id="analytics-cookies">
                <span class="slider"></span>
            </label>
            <span class="status" id="analytics-status">NO</span>
        </div>

        <!-- Cookies marketing -->
        <div class="cookie-option">
            <span>Cookies marketing</span>
            <label class="switch">
                <input type="checkbox" id="marketing-cookies">
                <span class="slider"></span>
            </label>
            <span class="status" id="marketing-status">NO</span>
        </div>

        <div class="cookie-actions">
            <button id="save-preferences">Enregistrer mes choix</button>
        </div>
    </div>
</div>

<!-- ===================== -->
<!-- 📜 SCRIPT COOKIES -->
<!-- ===================== -->
<script src="cookies.js"></script>



</body>

</html>
